name: audio_defect_detector
description: "Pure Dart library to detect pops and clicks in WAV audio files using adaptive threshold analysis."
version: 0.1.0
repository: https://github.com/bovinemagnet/dart_pop_n_click
homepage: https://github.com/bovinemagnet/dart_pop_n_click
topics:
  - audio
  - analysis
  - wav
  - signal-processing

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  args: ^2.5.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0

executables:
  audiodefect: audiodefect
